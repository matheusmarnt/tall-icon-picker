name: Fix PHP Code Style

on:
  push:
    branches: [main, develop]

jobs:
  fix-code-style:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring

      - name: Install Pint
        run: composer global require laravel/pint

      - name: Run Pint
        run: pint

      - name: Commit changes
        uses: stefanzwi/git-auto-commit-action@v5
        with:
          commit_message: "fix: apply PHP code style fixes"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
